<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Control - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 svg {
            color: #1ed760;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1ed760;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Add Rule Form */
        .add-form {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid #2a2a2a;
        }

        .add-form h2 {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-form h2 svg {
            color: #1ed760;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1ed760;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1ed760;
            color: #000;
        }

        .btn-primary:hover {
            background: #1db954;
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
            padding: 8px 16px;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        /* Rules Table */
        .rules-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .rules-table {
            width: 100%;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .rules-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .rules-table th,
        .rules-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
        }

        .rules-table th {
            background: #0f0f0f;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rules-table tr:last-child td {
            border-bottom: none;
        }

        .rules-table tr:hover td {
            background: #222;
        }

        .version-badge {
            display: inline-block;
            background: #2a2a2a;
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
        }

        .mode-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .mode-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .mode-lockout {
            background: rgba(220, 38, 38, 0.2);
            color: #dc2626;
        }

        .message-cell {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #666;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(30, 215, 96, 0.1);
            color: #1ed760;
            border: 1px solid rgba(30, 215, 96, 0.2);
        }

        .alert-error {
            background: rgba(220, 38, 38, 0.1);
            color: #dc2626;
            border: 1px solid rgba(220, 38, 38, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/admin/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Admin
        </a>

        <div class="header">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                Version Control
            </h1>
        </div>

        <div id="alert-container"></div>

        <!-- Add Rule Form -->
        <div class="add-form">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="16" />
                    <line x1="8" y1="12" x2="16" y2="12" />
                </svg>
                Add Version Rule
            </h2>
            <form id="add-rule-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Version Number</label>
                        <input type="text" id="version" placeholder="e.g., 1.0.0" required>
                    </div>
                    <div class="form-group">
                        <label>Mode</label>
                        <select id="mode" required>
                            <option value="warning">Warning (Dismissible)</option>
                            <option value="lockout">Lockout (Must Update)</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Message to Users</label>
                        <textarea id="message" placeholder="Enter the message to display to users..."
                            required></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Download URL (Optional)</label>
                        <input type="url" id="download-url" placeholder="https://example.com/download">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Rule</button>
            </form>
        </div>

        <!-- Rules List -->
        <div class="rules-section">
            <h2>Active Version Rules</h2>
            <div class="rules-table" id="rules-container">
                <div class="loading">Loading rules...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const adminToken = localStorage.getItem('adminToken');

        if (!adminToken) {
            window.location.href = '/admin/';
        }

        // Load rules on page load
        loadRules();

        // Form submit handler
        document.getElementById('add-rule-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const version = document.getElementById('version').value.trim();
            const mode = document.getElementById('mode').value;
            const message = document.getElementById('message').value.trim();
            const downloadUrl = document.getElementById('download-url').value.trim();

            try {
                const response = await fetch(`${API_BASE}/api/admin/versions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ version, mode, message, downloadUrl })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to add rule');
                }

                showAlert('Version rule added successfully', 'success');
                document.getElementById('add-rule-form').reset();
                loadRules();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });

        async function loadRules() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/versions`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });

                if (response.status === 401) {
                    window.location.href = '/admin/';
                    return;
                }

                const data = await response.json();
                renderRules(data.rules);
            } catch (error) {
                console.error('Load rules error:', error);
                document.getElementById('rules-container').innerHTML = `
                    <div class="empty-state">Failed to load rules</div>
                `;
            }
        }

        function renderRules(rules) {
            const container = document.getElementById('rules-container');

            if (!rules || rules.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                        <h3>No Version Rules</h3>
                        <p>All app versions are currently allowed</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Version</th>
                            <th>Mode</th>
                            <th>Message</th>
                            <th>Download URL</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rules.map(rule => `
                            <tr>
                                <td><span class="version-badge">${escapeHtml(rule.version)}</span></td>
                                <td>
                                    <span class="mode-badge mode-${rule.mode}">
                                        ${rule.mode === 'warning' ? 'Warning' : 'Lockout'}
                                    </span>
                                </td>
                                <td class="message-cell" title="${escapeHtml(rule.message)}">${escapeHtml(rule.message)}</td>
                                <td>${rule.download_url ? `<a href="${escapeHtml(rule.download_url)}" target="_blank" style="color: #1ed760;">Link</a>` : '-'}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteRule(${rule.id})">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function deleteRule(id) {
            if (!confirm('Are you sure you want to delete this version rule?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/admin/versions/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });

                if (!response.ok) {
                    throw new Error('Failed to delete rule');
                }

                showAlert('Version rule deleted', 'success');
                loadRules();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
