<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 svg {
            color: #1ed760;
        }

        .stats {
            display: flex;
            gap: 24px;
        }

        .stat {
            background: #1a1a1a;
            padding: 16px 24px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1ed760;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .reports-grid {
            display: grid;
            gap: 20px;
        }

        .report-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2a2a2a;
            transition: all 0.2s;
        }

        .report-card:hover {
            border-color: #1ed760;
            transform: translateY(-2px);
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .report-subject {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .report-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #888;
        }

        .report-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .report-id {
            background: #2a2a2a;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            font-family: monospace;
        }

        .report-message {
            background: #0f0f0f;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
        }

        .report-images {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .report-image {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .report-image:hover {
            border-color: #1ed760;
            transform: scale(1.05);
        }

        .report-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #666;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 80px 40px;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a2a;
            border-top-color: #1ed760;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1ed760;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Image Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #2a2a2a;
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/admin/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Admin
        </a>

        <div class="header">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z" />
                    <line x1="4" y1="22" x2="4" y2="15" />
                </svg>
                Problem Reports
            </h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-count">-</div>
                    <div class="stat-label">Total Reports</div>
                </div>
            </div>
        </div>

        <div id="reports-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading reports...</p>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="image-modal">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <img id="modal-image" src="" alt="Report Image">
    </div>

    <script>
        async function loadReports() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();

                document.getElementById('total-count').textContent = reports.length;

                const container = document.getElementById('reports-container');

                if (reports.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <h2>No Reports Yet</h2>
                            <p>Problem reports from users will appear here</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = '<div class="reports-grid">' + reports.map(report => `
                    <div class="report-card">
                        <div class="report-header">
                            <div>
                                <div class="report-subject">${escapeHtml(report.subject)}</div>
                                <div class="report-meta">
                                    <span>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                            <circle cx="12" cy="7" r="4"/>
                                        </svg>
                                        ${escapeHtml(report.name)}
                                    </span>
                                    <span>
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"/>
                                            <polyline points="12 6 12 12 16 14"/>
                                        </svg>
                                        ${formatDate(report.createdAt)}
                                    </span>
                                </div>
                            </div>
                            <span class="report-id">#${report.id}</span>
                        </div>
                        <div class="report-message">${escapeHtml(report.message)}</div>
                        ${report.images && report.images.length > 0 ? `
                            <div class="report-images">
                                ${report.images.map(img => `
                                    <div class="report-image" onclick="openModal('/api/reports/images/${img}')">
                                        <img src="/api/reports/images/${img}" alt="Screenshot">
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('') + '</div>';

            } catch (error) {
                console.error('Failed to load reports:', error);
                document.getElementById('reports-container').innerHTML = `
                    <div class="empty-state">
                        <h2>Failed to Load</h2>
                        <p>Could not fetch reports. Please try again.</p>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function openModal(src) {
            document.getElementById('modal-image').src = src;
            document.getElementById('image-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.remove('active');
        }

        document.getElementById('image-modal').addEventListener('click', (e) => {
            if (e.target.id === 'image-modal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        loadReports();
    </script>
</body>

</html>
