name: Build/Release CineStream

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.4.1
  workflow_dispatch: # Allow manual triggering

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          cd app
          npm install

      - name: Build/Release Electron app
        shell: bash
        run: |
          cd app
          # --win --mac --linux will build for all platforms
          # --publish always will create the GitHub Release assets
          if [ "${{ runner.os }}" == "Windows" ]; then
            ./node_modules/.bin/electron-builder --win --publish always
          elif [ "${{ runner.os }}" == "macOS" ]; then
            # We disable code signing (CSC_IDENTITY_AUTO_DISCOVERY=false) 
            # so the build doesn't fail due to missing certificates
            CSC_IDENTITY_AUTO_DISCOVERY=false ./node_modules/.bin/electron-builder --mac --publish always
          else
            ./node_modules/.bin/electron-builder --linux --publish always
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
